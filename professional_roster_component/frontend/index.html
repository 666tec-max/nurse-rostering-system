<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@1.4.0/dist/index.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-bg: #eff6ff;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            
            --row-height: 56px;
            --name-width: 180px;
            --cell-width: 84px;
            --font-size: 0.8125rem;
            
            --weekend-bg: #f8fafc;
            --locked-border: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            display: flex; flex-direction: column;
            height: 100vh;
        }

        /* Toolbar / Palette Styling */
        #toolbar {
            background: white;
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex; align-items: center;
            gap: 16px;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }

        .toolbar-label {
            font-size: 0.7rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-muted);
            white-space: nowrap;
        }

        #palette {
            display: flex; gap: 8px;
            overflow-x: auto; padding: 2px 0;
            scrollbar-width: none;
        }
        #palette::-webkit-scrollbar { display: none; }

        .palette-item {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: white;
            cursor: pointer;
            display: flex; align-items: center;
            gap: 8px;
            font-size: 0.8125rem; font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s;
            user-select: none;
        }

        .palette-item:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px);
        }

        .palette-item.active {
            border-color: var(--primary);
            background: var(--primary-bg);
            color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-bg);
        }

        .color-dot {
            width: 14px; height: 14px;
            border-radius: 4px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* Main Roster Container */
        #roster-outer {
            flex-grow: 1; padding: 12px;
            overflow: hidden;
            position: relative;
        }

        #roster-wrapper {
            width: 100%; height: 100%;
            overflow: auto;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            position: relative;
        }

        #zoom-container { transform-origin: top left; }

        table {
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
            width: max-content;
        }

        th, td {
            height: var(--row-height);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            vertical-align: middle;
            padding: 0 8px;
            transition: background-color 0.1s;
        }

        /* Sticky Columns with Elevation */
        .sticky-col {
            position: sticky; left: 0; z-index: 10;
            background: white !important;
            width: var(--name-width);
            text-align: left !important;
            padding-left: 20px !important;
            font-weight: 600;
        }

        .sticky-col::after {
            content: '';
            position: absolute; right: 0; top: 0; bottom: 0;
            width: 8px;
            background: linear-gradient(to right, rgba(0,0,0,0.06), transparent);
            pointer-events: none;
            opacity: 0; transition: opacity 0.3s;
        }
        #roster-wrapper.scrolled-x .sticky-col::after { opacity: 1; }

        thead th {
            position: sticky; top: 0; z-index: 20;
            background: #f8fafc !important;
            color: var(--text-muted);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 800;
        }

        thead th::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.06), transparent);
            pointer-events: none;
            opacity: 0; transition: opacity 0.3s;
        }
        #roster-wrapper.scrolled-y thead th::after { opacity: 1; }

        /* Cell Interactive Styles */
        .shift-cell {
            cursor: pointer;
            width: var(--cell-width);
            font-weight: 700;
            font-size: 0.8125rem;
            position: relative;
        }

        .shift-cell:hover {
            filter: contrast(1.1) brightness(0.97);
            z-index: 5;
            box-shadow: inset 0 0 0 2px var(--primary);
        }

        .weekend { background-color: var(--weekend-bg) !important; color: var(--text-muted); }

        .locked { box-shadow: inset 0 0 0 2px var(--locked-border) !important; }
        
        .locked::before {
            content: '🔒'; position: absolute;
            top: 2px; left: 2px;
            font-size: 8px; opacity: 0.4;
        }

        /* Sidebar Toggle */
        #settings-trigger {
            margin-left: auto;
            background: #f1f5f9; border: 1px solid var(--border-color);
            border-radius: 8px; padding: 8px 14px;
            font-size: 0.8125rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: all 0.2s;
        }
        #settings-trigger:hover { background: #e2e8f0; transform: translateY(-1px); }

        /* Sidebar Panel */
        #sidebar {
            position: fixed; top: 0; right: -320px;
            width: 320px; height: 100vh;
            background: white; z-index: 200;
            box-shadow: var(--shadow-lg);
            border-left: 1px solid var(--border-color);
            padding: 32px;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar.open { right: 0; }

        .sidebar-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 32px;
        }
        .sidebar-close {
            background: none; border: none; font-size: 1.5rem;
            cursor: pointer; color: var(--text-muted); padding: 4px;
        }

        .settings-group { margin-bottom: 32px; }
        .settings-label {
            font-size: 0.7rem; font-weight: 800;
            color: var(--text-muted); text-transform: uppercase;
            margin-bottom: 16px; display: block; letter-spacing: 0.05em;
        }

        input[type="range"] {
            width: 100%; height: 6px; background: #e2e8f0;
            border-radius: 3px; appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; width: 18px; height: 18px;
            background: var(--primary); border-radius: 50%; cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        /* Tooltip Edit Modal */
        #cell-modal {
            display: none; position: absolute;
            background: white; border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg); padding: 20px;
            border-radius: 12px; z-index: 1000;
            width: 280px; animation: modalIn 0.2s ease-out;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(12px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        #modal-title { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        #modal-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 20px; font-weight: 500; }
        
        .modal-field { margin-bottom: 16px; }
        .modal-field label {
            font-size: 0.65rem; font-weight: 800;
            color: var(--text-muted); text-transform: uppercase;
            display: block; margin-bottom: 6px;
        }

        select, textarea {
            width: 100%; padding: 10px;
            border-radius: 8px; border: 1px solid var(--border-color);
            font-family: inherit; font-size: 0.875rem;
        }
        select:focus, textarea:focus {
            outline: none; border-color: var(--primary); ring: 2px solid var(--primary-bg);
        }

        /* Toast Feedback */
        #toast {
            position: fixed; bottom: 32px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b; color: white;
            padding: 12px 24px; border-radius: 99px;
            font-size: 0.875rem; font-weight: 600;
            z-index: 2000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 10px;
            box-shadow: var(--shadow-lg);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .remark-marker {
            position: absolute; top: 4px; right: 4px;
            width: 7px; height: 7px; border-radius: 50%;
            background: #f59e0b; border: 1px solid white;
        }

        .painting-mode .shift-cell { cursor: cell; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">
    <div id="toolbar">
        <span class="toolbar-label">Shift Palette</span>
        <div id="palette"></div>
        <button id="settings-trigger" onclick="toggleSidebar(event)">⚙️ Settings & Legend</button>
    </div>

    <div id="roster-outer">
        <div id="roster-wrapper" onscroll="handleScroll(this)">
            <div id="zoom-container">
                <table id="roster-table">
                    <thead id="roster-head"></thead>
                    <tbody id="roster-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Sidebar Overlay -->
    <div id="sidebar">
        <div class="sidebar-header">
            <h3 style="margin:0">Roster Controls</h3>
            <button class="sidebar-close" onclick="toggleSidebar(event)">×</button>
        </div>

        <div class="settings-group">
            <span class="settings-label">Zoom Perspective</span>
            <input type="range" min="50" max="150" value="100" id="zoom-range" oninput="updateZoom(this.value)">
            <div style="display:flex; justify-content:space-between; margin-top:8px; font-size:0.7rem; color:var(--text-muted);">
                <span>Compact (50%)</span>
                <span>Spacious (150%)</span>
            </div>
        </div>

        <div class="settings-group">
            <span class="settings-label">Visibility</span>
            <label style="display:flex; align-items:center; gap:10px; font-size: 0.875rem; cursor:pointer">
                <input type="checkbox" id="weekend-toggle" onchange="toggleWeekendHighlight(this.checked)"> Highlight Weekends
            </label>
        </div>

        <div class="settings-group">
            <span class="settings-label">Shift Legend</span>
            <div id="sidebar-legend" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
            <div style="margin-top: 24px; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid #f1f5f9; padding-top: 16px;">
                <div style="display:flex; align-items:center; margin-bottom:6px;">
                    <span style="display:inline-block; width:14px; height:14px; border: 2px solid #ef4444; margin-right:8px; border-radius:3px;"></span> Locked Choice
                </div>
                <div style="display:flex; align-items:center;">
                    <span style="display:inline-block; width:14px; height:14px; background:#f59e0b; border-radius:50%; margin-right:8px; border: 1px solid white;"></span> Internal Note
                </div>
            </div>
        </div>
    </div>

    <!-- Cell Edit Modal -->
    <div id="cell-modal">
        <div id="modal-title">-</div>
        <div id="modal-subtitle">-</div>
        
        <div class="modal-field">
            <label>Assignment</label>
            <select id="modal-shift"></select>
        </div>
        
        <div class="modal-field">
            <label style="display: flex; align-items: center; gap:10px; cursor: pointer; text-transform: none; font-weight: 600; font-size: 0.8125rem;">
                <input type="checkbox" id="modal-locked" style="width:18px; height:18px;"> Lock Manually
            </label>
        </div>
        
        <div class="modal-field">
            <label>Staff Remark</label>
            <textarea id="modal-remark" rows="3" placeholder="Click to type..."></textarea>
        </div>
        
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
            <button onclick="closeTooltip()" style="padding:8px 16px; border-radius:8px; border:1px solid var(--border-color); background:white; font-size:0.8125rem; font-weight:600; cursor:pointer;">Cancel</button>
            <button onclick="saveTooltip()" style="padding:8px 16px; border-radius:8px; border:none; background:var(--primary); color:white; font-weight:700; font-size:0.8125rem; cursor:pointer;">Save Plan</button>
        </div>
    </div>

    <div id="toast">
        <span id="toast-icon">✨</span>
        <span id="toast-msg">Success</span>
    </div>

    <script>
        // State Persistence Keys
        const STORAGE_KEY = 'roster_ui_v2_';
        
        let isMouseDown = false;
        let selectedShift = localStorage.getItem(STORAGE_KEY + 'selected_shift') || null;
        let zoomVal = parseInt(localStorage.getItem(STORAGE_KEY + 'zoom') || '100');
        let highlights = localStorage.getItem(STORAGE_KEY + 'highlights') !== 'false';
        
        let shiftColors = {};
        let lockedAssignments = {};
        let scheduleData = {};
        let dateLabels = [];
        let nurseNames = [];
        let nurseDetails = {};
        let remarks = {};
        let activeCell = null;

        function onStreamlitRender(event) {
            const data = event.detail.args;
            nurseNames = data.nurse_names || [];
            dateLabels = data.date_labels || [];
            scheduleData = data.schedule_data || {};
            shiftColors = data.shift_colors || {};
            lockedAssignments = data.locked_assignments || {};
            nurseDetails = data.nurse_details || {};
            remarks = data.remarks || {};
            
            // Sync initial state from Python if first run
            if (data.painter_shift && !selectedShift) selectedShift = data.painter_shift;
            
            renderPalette();
            renderRoster();
            populateShiftDropdown();
            
            // Apply persisted settings
            document.getElementById('zoom-range').value = zoomVal;
            document.getElementById('weekend-toggle').checked = highlights;
            updateZoom(zoomVal, false); // Don't persist again on initial load
        }

        function renderPalette() {
            const palette = document.getElementById('palette');
            const legend = document.getElementById('sidebar-legend');
            palette.innerHTML = ''; legend.innerHTML = '';

            const handItem = document.createElement('div');
            handItem.className = `palette-item ${!selectedShift ? 'active' : ''}`;
            handItem.innerHTML = `<span style="font-size:16px">🤌</span> Inspect`;
            handItem.onclick = () => selectPaletteShift(null);
            palette.appendChild(handItem);

            Object.entries(shiftColors).forEach(([code, color]) => {
                if (code === '-') return; // Skip off in palette
                const isSelected = selectedShift === code;
                const item = document.createElement('div');
                item.className = `palette-item ${isSelected ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="color-dot" style="background:${color}"></div>
                    ${code}
                `;
                item.onclick = () => selectPaletteShift(code);
                palette.appendChild(item);

                const legItem = document.createElement('div');
                legItem.style = "display:flex; align-items:center; gap:8px; font-size:0.8125rem; font-weight:500;";
                legItem.innerHTML = `<div class="color-dot" style="background:${color}"></div> ${code}`;
                legend.appendChild(legItem);
            });
            
            // Add 'Off' at end
            const offCode = '-';
            const offColor = shiftColors[offCode] || '#fff';
            const offItem = document.createElement('div');
            offItem.className = `palette-item ${selectedShift === offCode ? 'active' : ''}`;
            offItem.innerHTML = `<div class="color-dot" style="background:${offColor}"></div> Off`;
            offItem.onclick = () => selectPaletteShift(offCode);
            palette.appendChild(offItem);
        }

        function selectPaletteShift(code) {
            selectedShift = code;
            localStorage.setItem(STORAGE_KEY + 'selected_shift', code || '');
            renderPalette();
            if (code) {
                document.body.classList.add('painting-mode');
                showToast(`Painting: ${code}`, "🖌️");
            } else {
                document.body.classList.remove('painting-mode');
                showToast("Selecting", "🤌");
            }
        }

        function renderRoster() {
            const head = document.getElementById('roster-head');
            const body = document.getElementById('roster-body');
            
            let headHtml = '<tr><th class="sticky-col">Employee Grid</th>';
            dateLabels.forEach(label => {
                const isWeekend = (label.includes('Sat') || label.includes('Sun')) && highlights;
                headHtml += `<th class="${isWeekend ? 'weekend' : ''}">${label}</th>`;
            });
            headHtml += '</tr>';
            head.innerHTML = headHtml;

            let bodyHtml = '';
            nurseNames.forEach(name => {
                const details = nurseDetails[name] || {};
                bodyHtml += `<tr><td class="sticky-col">
                    <div style="font-weight:700; font-size:0.875rem;">${name}</div>
                    <div style="font-size:0.65rem; color:var(--text-muted); font-weight:600;">${details.grade || ''}</div>
                </td>`;
                
                dateLabels.forEach((label, dIdx) => {
                    const shiftCode = scheduleData[name] ? (scheduleData[name][dIdx] || '-') : '-';
                    const isWeekend = (label.includes('Sat') || label.includes('Sun')) && highlights;
                    const isLocked = lockedAssignments[name] && lockedAssignments[name][dIdx];
                    const hasRemark = remarks[name] && remarks[name][dIdx];
                    const bgColor = shiftColors[shiftCode] || '#ffffff';
                    
                    bodyHtml += `
                        <td class="shift-cell ${isWeekend ? 'weekend' : ''} ${isLocked ? 'locked' : ''}" 
                            data-nurse="${name}" data-day="${dIdx}"
                            style="background-color: ${bgColor};"
                            onmousedown="startPaint(event)"
                            onmouseover="doPaint(event)"
                            onclick="handleCellClick(event)"
                        >${shiftCode}${hasRemark ? '<div class="remark-marker"></div>' : ''}</td>
                    `;
                });
                bodyHtml += '</tr>';
            });
            body.innerHTML = bodyHtml;
        }

        function updateZoom(val, persist = true) {
            zoomVal = val;
            if (persist) localStorage.setItem(STORAGE_KEY + 'zoom', val);
            const zoom = val / 100;
            document.getElementById('zoom-container').style.transform = `scale(${zoom})`;
            requestAnimationFrame(() => setFrameHeight());
        }

        function toggleWeekendHighlight(val) {
            highlights = val;
            localStorage.setItem(STORAGE_KEY + 'highlights', val);
            renderRoster();
        }

        function toggleSidebar(e) { e.stopPropagation(); document.getElementById('sidebar').classList.toggle('open'); }

        function startPaint(e) {
            if (!selectedShift || e.button !== 0) return;
            isMouseDown = true;
            paintCell(e.currentTarget);
        }

        function doPaint(e) { if (isMouseDown && selectedShift) paintCell(e.currentTarget); }

        function paintCell(cell) {
            const nurse = cell.dataset.nurse;
            const day = parseInt(cell.dataset.day);
            cell.innerText = selectedShift;
            cell.style.backgroundColor = shiftColors[selectedShift] || '#ffffff';
            cell.classList.add('locked');
            Streamlit.setComponentValue({ nurse, day, shift: selectedShift, locked: true, remark: (remarks[nurse] && remarks[nurse][day]) || '' });
        }

        window.addEventListener('mouseup', () => isMouseDown = false);

        function handleCellClick(e) {
            if (selectedShift) return;
            e.stopPropagation();
            const cell = e.currentTarget;
            const nurse = cell.dataset.nurse;
            const dayIdx = parseInt(cell.dataset.day);
            activeCell = { nurse, dayIdx };

            const details = nurseDetails[nurse] || {};
            document.getElementById('modal-title').textContent = `${nurse}`;
            document.getElementById('modal-subtitle').textContent = `${dateLabels[dayIdx]} • ${details.department || ''}`;
            
            document.getElementById('modal-shift').value = scheduleData[nurse] ? (scheduleData[nurse][dayIdx] || '-') : '-';
            document.getElementById('modal-locked').checked = !!(lockedAssignments[nurse] && lockedAssignments[nurse][dayIdx]);
            document.getElementById('modal-remark').value = (remarks[nurse] && remarks[nurse][dayIdx]) || '';

            const modal = document.getElementById('cell-modal');
            modal.style.display = 'block';
            const cellRect = cell.getBoundingClientRect();
            const modalRect = modal.getBoundingClientRect();
            let top = cellRect.bottom + 10;
            let left = cellRect.left + (cellRect.width/2) - (modalRect.width/2);
            if (left < 10) left = 10;
            if (left + modalRect.width > window.innerWidth - 10) left = window.innerWidth - modalRect.width - 10;
            if (top + modalRect.height > window.innerHeight - 10) top = cellRect.top - modalRect.height - 10;
            modal.style.top = `${top}px`; modal.style.left = `${left}px`;
        }

        function closeTooltip() { document.getElementById('cell-modal').style.display = 'none'; activeCell = null; }
        function saveTooltip() {
            if (!activeCell) return;
            const { nurse, dayIdx } = activeCell;
            const val = { nurse, day: dayIdx, shift: document.getElementById('modal-shift').value, locked: document.getElementById('modal-locked').checked, remark: document.getElementById('modal-remark').value };
            Streamlit.setComponentValue(val);
            showToast("Saved Change", "💾"); closeTooltip();
        }

        function populateShiftDropdown() {
            const select = document.getElementById('modal-shift');
            select.innerHTML = '';
            Object.keys(shiftColors).forEach(s => {
                const opt = document.createElement('option'); opt.value = s;
                opt.textContent = s === '-' ? 'Off / No Shift' : s; select.appendChild(opt);
            });
        }

        function showToast(msg, icon = "✅") {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            document.getElementById('toast-icon').textContent = icon;
            toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 1500);
        }

        function handleScroll(el) {
            el.classList.toggle('scrolled-x', el.scrollLeft > 5);
            el.classList.toggle('scrolled-y', el.scrollTop > 5);
        }

        function handleGlobalClick(e) {
            if (!document.getElementById('cell-modal').contains(e.target) && !e.target.closest('.shift-cell')) closeTooltip();
            if (!document.getElementById('sidebar').contains(e.target) && !e.target.closest('#settings-trigger')) document.getElementById('sidebar').classList.remove('open');
        }

        Streamlit.setComponentReady();
        Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onStreamlitRender);
        const setFrameHeight = () => Streamlit.setFrameHeight(document.body.scrollHeight);
        setInterval(setFrameHeight, 1000);
    </script>
</body>
</html>
