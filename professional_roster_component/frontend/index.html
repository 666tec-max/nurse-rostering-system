<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@1.4.0/dist/index.min.js"></script>
    <style>
        :root {
            --row-height: 48px;
            --name-width: 160px;
            --cell-width: 80px; /* Default */
            --header-bg: #fdfdfd;
            --border-color: #e2e8f0;
            --locked-outline: #ef4444;
            --weekend-bg: #f8fafc;
            --font-size: 0.875rem;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        #zoom-container {
            transform-origin: top left;
        }

        #roster-wrapper {
            width: 100%;
            height: 100vh;
            overflow: auto;
            border: 1px solid var(--border-color);
            background: white;
            position: relative;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
        }

        th, td {
            height: var(--row-height);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            vertical-align: middle;
            user-select: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 4px;
        }

        /* Sticky Personnel Header */
        th.sticky-col, td.sticky-col {
            position: sticky;
            left: 0;
            z-index: 10;
            background: var(--header-bg);
            width: var(--name-width);
            text-align: left;
            padding-left: 12px;
            border-right: 2px solid var(--border-color);
            font-weight: 500;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 20;
            background: var(--header-bg);
            font-weight: 600;
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        thead th.sticky-col {
            z-index: 30;
        }

        .shift-cell {
            cursor: pointer;
            width: var(--cell-width);
            font-weight: 600;
            font-size: var(--font-size);
            transition: all 0.15s ease;
            position: relative;
        }

        .shift-cell:hover {
            filter: brightness(0.92);
            transform: scale(0.98);
        }

        .weekend {
            background-color: var(--weekend-bg);
        }

        .locked {
            box-shadow: inset 0 0 0 2px var(--locked-outline);
            border-radius: 4px;
        }

        /* Painter active style */
        .painting-mode .shift-cell {
            cursor: cell;
        }

        /* Remark marker */
        .remark-marker {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 6px solid #f59e0b; /* Amber */
            transform: rotate(45deg);
        }

        /* Tooltip Modal Styles */
        #cell-modal {
            display: none;
            position: absolute;
            background: white;
            border: 1px solid #cbd5e1;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 16px;
            border-radius: 8px;
            z-index: 1000;
            width: 240px;
            font-family: inherit;
        }

        #cell-modal label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 4px;
            display: block;
        }

        #cell-modal select, #cell-modal textarea {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.875rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        #cell-modal select:focus, #cell-modal textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 1px #3b82f6;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 12px;
        }

        .modal-buttons button {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-cancel {
            background: white;
            border: 1px solid #cbd5e1;
            color: #475569;
        }

        .btn-cancel:hover {
            background: #f8fafc;
        }

        .btn-save {
            background: #3b82f6;
            border: 1px solid #3b82f6;
            color: white;
        }

        .btn-save:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div id="roster-wrapper">
        <div id="zoom-container">
            <table id="roster-table">
                <thead id="roster-head"></thead>
                <tbody id="roster-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Interactive Tooltip Modal -->
    <div id="cell-modal">
        <div style="font-size: 0.95rem; font-weight: 700; color: #0f172a; margin-bottom: 2px;" id="modal-title">Name - Date</div>
        <div style="font-size: 0.75rem; color: #64748b; margin-bottom: 12px; font-weight: 500;" id="modal-subtitle">Dept | Grade</div>
        
        <div style="margin-bottom: 12px;">
            <label for="modal-shift">Assigned Shift / Leave</label>
            <select id="modal-shift"></select>
        </div>
        
        <div style="margin-bottom: 12px;">
            <label style="display: flex; align-items: center; cursor: pointer; color: #334155; font-size: 0.875rem; font-weight: 500;">
                <input type="checkbox" id="modal-locked" style="margin-right: 6px; width: 14px; height: 14px; cursor: pointer;"> 
                Lock Assignment
            </label>
        </div>
        
        <div>
            <label for="modal-remark">Remarks</label>
            <textarea id="modal-remark" rows="2" placeholder="Add note..."></textarea>
        </div>
        
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeTooltip()">Cancel</button>
            <button class="btn-save" onclick="saveTooltip()">Apply</button>
        </div>
    </div>

    <script>
        let isMouseDown = false;
        let currentPainterShift = null;
        let shiftColors = {};
        let lockedAssignments = {};
        let scheduleData = {};
        let dateLabels = [];
        let nurseNames = [];
        
        // New Data
        let nurseDetails = {};
        let remarks = {};
        
        // Modal State
        let activeCell = null;

        function onStreamlitRender(event) {
            const data = event.detail.args;
            nurseNames = data.nurse_names || [];
            dateLabels = data.date_labels || [];
            scheduleData = data.schedule_data || {};
            shiftColors = data.shift_colors || {};
            lockedAssignments = data.locked_assignments || {};
            
            nurseDetails = data.nurse_details || {};
            remarks = data.remarks || {};
            
            currentPainterShift = data.painter_shift;
            
            const zoom = (data.zoom_level || 100) / 100;
            const container = document.getElementById('zoom-container');
            container.style.transform = `scale(${zoom})`;
            
            renderRoster();
            populateShiftDropdown();
        }

        function populateShiftDropdown() {
            const select = document.getElementById('modal-shift');
            select.innerHTML = '';
            
            // Add options based on shiftColors keys
            Object.keys(shiftColors).forEach(shiftCode => {
                const opt = document.createElement('option');
                opt.value = shiftCode;
                opt.textContent = shiftCode === '-' ? 'None / Off' : shiftCode;
                select.appendChild(opt);
            });
        }

        function renderRoster() {
            const head = document.getElementById('roster-head');
            const body = document.getElementById('roster-body');
            
            // Render Head
            let headHtml = '<tr><th class="sticky-col">Personnel</th>';
            dateLabels.forEach(label => {
                const isWeekend = label.includes('Sat') || label.includes('Sun');
                headHtml += `<th class="${isWeekend ? 'weekend' : ''}">${label}</th>`;
            });
            headHtml += '</tr>';
            head.innerHTML = headHtml;

            // Render Body
            let bodyHtml = '';
            nurseNames.forEach(name => {
                bodyHtml += `<tr><td class="sticky-col">${name}</td>`;
                dateLabels.forEach((label, dIdx) => {
                    const shiftCode = scheduleData[name] ? (scheduleData[name][dIdx] || '-') : '-';
                    const isWeekend = label.includes('Sat') || label.includes('Sun');
                    const isLocked = lockedAssignments[name] && lockedAssignments[name][dIdx];
                    const hasRemark = remarks[name] && remarks[name][dIdx];
                    const bgColor = shiftColors[shiftCode] || '#ffffff';
                    
                    const lockIcon = isLocked ? '<span style="color: #ef4444; font-size: 0.6rem; vertical-align: top; margin-left: 2px;">🔒</span>' : '';
                    const remarkIcon = hasRemark ? '<div class="remark-marker" title="Has remark"></div>' : '';
                    
                    bodyHtml += `
                        <td class="shift-cell ${isWeekend ? 'weekend' : ''} ${isLocked ? 'locked' : ''}" 
                            data-nurse="${name}" data-day="${dIdx}"
                            style="background-color: ${bgColor};"
                            onmousedown="startPaint(event)"
                            onmouseover="doPaint(event)"
                            onclick="handleCellClick(event)"
                        >${shiftCode}${lockIcon}${remarkIcon}</td>
                    `;
                });
                bodyHtml += '</tr>';
            });
            body.innerHTML = bodyHtml;
            
            if (currentPainterShift) {
                document.body.classList.add('painting-mode');
            } else {
                document.body.classList.remove('painting-mode');
            }
        }

        function startPaint(e) {
            if (!currentPainterShift || e.button !== 0) return; // Only left click for paint
            isMouseDown = true;
            paintCell(e.currentTarget);
        }

        function doPaint(e) {
            if (isMouseDown && currentPainterShift) {
                paintCell(e.currentTarget);
            }
        }

        function paintCell(cell) {
            const nurse = cell.dataset.nurse;
            const day = parseInt(cell.dataset.day);
            
            if (!nurse) return;

            cell.innerText = currentPainterShift;
            cell.style.backgroundColor = shiftColors[currentPainterShift] || '#ffffff';
            cell.classList.add('locked'); // Painting locks it implicitly
            
            // Notify Streamlit
            Streamlit.setComponentValue({
                nurse: nurse,
                day: day,
                shift: currentPainterShift,
                locked: true,
                remark: (remarks[nurse] && remarks[nurse][day]) || ''
            });
        }

        window.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        // Tooltip interaction
        function handleCellClick(e) {
            // Do not open tooltip if in painter mode
            if (currentPainterShift) return;

            const cell = e.currentTarget;
            const nurse = cell.dataset.nurse;
            const dayIdx = parseInt(cell.dataset.day);
            
            activeCell = { nurse, dayIdx };
            
            // Populate modal data
            document.getElementById('modal-title').textContent = `${nurse} • ${dateLabels[dayIdx]}`;
            
            const details = nurseDetails[nurse] || { department: "Unknown", grade: "Rank" };
            document.getElementById('modal-subtitle').textContent = `${details.department} | ${details.grade}`;
            
            const currentShift = scheduleData[nurse] ? (scheduleData[nurse][dayIdx] || '-') : '-';
            document.getElementById('modal-shift').value = currentShift;
            
            document.getElementById('modal-locked').checked = !!(lockedAssignments[nurse] && lockedAssignments[nurse][dayIdx]);
            
            document.getElementById('modal-remark').value = (remarks[nurse] && remarks[nurse][dayIdx]) || '';
            
            // Position modal relative to viewport, handling bounds
            const modal = document.getElementById('cell-modal');
            modal.style.display = 'block';
            
            const cellRect = cell.getBoundingClientRect();
            const modalRect = modal.getBoundingClientRect();
            
            let top = cellRect.bottom + 5;
            let left = cellRect.left + (cellRect.width / 2) - (modalRect.width / 2);
            
            // Boundary checks
            if (left < 10) left = 10;
            if (left + modalRect.width > window.innerWidth - 10) left = window.innerWidth - modalRect.width - 10;
            
            // If tooltip goes off bottom of screen, show it above the cell
            if (top + modalRect.height > window.innerHeight - 10) {
                top = cellRect.top - modalRect.height - 5;
            }
            
            modal.style.top = `${top}px`;
            modal.style.left = `${left}px`;
            
            // Focus on first input
            document.getElementById('modal-shift').focus();
            
            // Stop event to prevent document click handler from immediately closing it
            e.stopPropagation();
        }

        function closeTooltip() {
            document.getElementById('cell-modal').style.display = 'none';
            activeCell = null;
        }

        function saveTooltip() {
            if (!activeCell) return;
            
            const { nurse, dayIdx } = activeCell;
            const shift = document.getElementById('modal-shift').value;
            const locked = document.getElementById('modal-locked').checked;
            const remark = document.getElementById('modal-remark').value;
            
            // Send to Streamlit
            Streamlit.setComponentValue({
                nurse: nurse,
                day: dayIdx,
                shift: shift,
                locked: locked,
                remark: remark
            });
            
            closeTooltip();
        }

        // Close tooltip when clicking outside
        document.addEventListener('click', function(e) {
            const modal = document.getElementById('cell-modal');
            if (modal.style.display === 'block' && !modal.contains(e.target) && !e.target.closest('.shift-cell')) {
                closeTooltip();
            }
        });

        // Initial setup
        Streamlit.setComponentReady();
        Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onStreamlitRender);

        function setFrameHeight() {
            const height = document.getElementById('roster-wrapper').scrollHeight;
            Streamlit.setFrameHeight(height);
        }
        window.addEventListener('resize', setFrameHeight);
        
        setInterval(setFrameHeight, 1000); 
        setTimeout(setFrameHeight, 100);
        setTimeout(setFrameHeight, 500);
    </script>
</body>
</html>
